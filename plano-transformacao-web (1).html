<style>
:root{
  --ink:#14161C; --ink2:#3A3F4B; --muted:#8A90A0; --paper:#EDEFF3;
  --surface:#FFFFFF; --surface2:#F7F8FA; --line:#E5E8ED;
  --volt:#C9F73B; --volt-deep:#8FBF00; --teal:#17BEBB; --amber:#FFB020; --ember:#FF7A45;
  --shadow:0 12px 34px -18px rgba(20,22,28,.28);
  --r:20px;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{
  font-family:'Inter',system-ui,-apple-system,sans-serif;
  background:var(--paper); color:var(--ink);
  -webkit-font-smoothing:antialiased; line-height:1.5;
}
h1,h2,h3,h4{font-family:'Archivo',sans-serif;letter-spacing:-.02em;line-height:1.08;}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
input{font-family:inherit;}
::-webkit-scrollbar{width:10px;height:10px;}
::-webkit-scrollbar-thumb{background:#d3d7de;border-radius:99px;border:3px solid var(--paper);}
.volt-text{color:var(--volt-deep);}
.muted{color:var(--muted);}
.eyebrow{font-size:11px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--volt-deep);}
:focus-visible{outline:2px solid var(--volt-deep);outline-offset:2px;border-radius:6px;}

/* ---------- BUTTONS ---------- */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;font-family:'Archivo';font-weight:700;border-radius:14px;transition:transform .12s,background .2s,box-shadow .2s;}
.btn:active{transform:translateY(1px);}
.btn-primary{background:var(--ink);color:#fff;padding:14px 22px;font-size:15px;}
.btn-primary:hover{transform:translateY(-2px);box-shadow:var(--shadow);}
.btn-primary.lg{padding:17px 26px;font-size:16px;}
.btn-volt{background:var(--volt);color:var(--ink);padding:14px 22px;font-size:15px;}
.btn-volt:hover{transform:translateY(-2px);box-shadow:0 14px 30px -14px rgba(143,191,0,.6);}
.btn-secondary{background:var(--surface);color:var(--ink);border:1px solid var(--line);padding:12px 18px;font-size:14px;font-weight:600;}
.btn-secondary:hover{border-color:var(--ink);}
.btn-mini{background:var(--ink);color:#fff;padding:7px 13px;border-radius:10px;font-size:12.5px;font-weight:600;display:inline-flex;align-items:center;gap:6px;}

/* ---------- ONBOARDING SHELL ---------- */
.onb{min-height:100vh;display:flex;flex-direction:column;}
.onb-nav{display:flex;align-items:center;justify-content:space-between;padding:22px 32px;}
.brand{display:flex;align-items:center;gap:10px;font-family:'Archivo';font-weight:800;font-size:16px;}
.brand-mark{width:32px;height:32px;border-radius:9px;background:var(--ink);color:var(--volt);display:grid;place-items:center;}
.onb-step{font-size:13px;color:var(--muted);font-weight:600;}
.onb-body{flex:1;display:flex;align-items:center;justify-content:center;padding:20px;}
.onb-card{width:100%;max-width:760px;}

/* ---------- WELCOME (hero) ---------- */
.hero-web{min-height:100vh;display:grid;grid-template-columns:1.05fr .95fr;background:var(--ink);color:#fff;}
.hero-left{padding:56px 60px;display:flex;flex-direction:column;justify-content:center;position:relative;overflow:hidden;}
.hero-left::before{content:"";position:absolute;top:-140px;left:-120px;width:420px;height:420px;background:radial-gradient(circle,var(--volt) 0%,transparent 68%);opacity:.16;}
.hero-left .brand{position:absolute;top:40px;left:60px;color:#fff;}
.hero-left .brand-mark{background:var(--volt);color:var(--ink);}
.hero-h1{font-size:clamp(40px,5vw,68px);font-weight:900;color:#fff;position:relative;}
.hero-h1 .volt-text{color:var(--volt);}
.hero-sub{margin-top:22px;max-width:440px;font-size:16px;line-height:1.6;color:rgba(255,255,255,.7);position:relative;}
.hero-cta{margin-top:36px;display:flex;gap:14px;align-items:center;position:relative;flex-wrap:wrap;}
.hero-cta small{color:rgba(255,255,255,.45);font-size:13px;}
.hero-feats{margin-top:44px;display:flex;flex-direction:column;gap:14px;position:relative;}
.hero-feat{display:flex;align-items:center;gap:13px;font-size:14.5px;color:rgba(255,255,255,.88);font-weight:500;}
.hero-feat .fi{width:36px;height:36px;border-radius:10px;background:rgba(201,247,59,.13);color:var(--volt);display:grid;place-items:center;flex-shrink:0;}
.hero-right{background:#0f1116;position:relative;display:grid;place-items:center;padding:40px;overflow:hidden;}
.hero-right::before{content:"";position:absolute;inset:0;background:
  radial-gradient(circle at 70% 20%,rgba(23,190,187,.14),transparent 45%),
  radial-gradient(circle at 20% 80%,rgba(201,247,59,.12),transparent 45%);}
.preview-card{position:relative;width:min(360px,88%);background:linear-gradient(165deg,#15181D,#0B0C0F);border:1px solid rgba(127,178,0,.18);color:#EDEFF3;border-radius:24px;padding:22px;box-shadow:0 40px 90px -30px rgba(0,0,0,.85),inset 0 1px 0 rgba(255,255,255,.04);}
.pc-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;}
.pc-top b{font-family:'Archivo';font-size:15px;color:#F1F3F7;}
.pc-goal{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#8ABF14;}
.pc-metrics{display:flex;gap:10px;margin-bottom:16px;}
.pc-metric{flex:1;background:rgba(255,255,255,.045);border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:12px;text-align:center;}
.pc-metric b{font-family:'Archivo';font-size:20px;display:block;color:#EDEFF3;}
.pc-metric span{font-size:11px;color:#8A90A0;}
.pc-bar-lbl{display:flex;justify-content:space-between;font-size:12px;margin-bottom:6px;color:#B7BDC9;}
.pc-bar-lbl b{color:#8ABF14;}
.pc-bar{height:9px;background:rgba(255,255,255,.1);border-radius:99px;overflow:hidden;}
.pc-bar>div{height:100%;width:42%;background:linear-gradient(90deg,#7FB200,#4E7A00);border-radius:99px;}

/* ---------- GOAL ---------- */
.section-lead{font-size:15px;color:var(--ink2);margin:6px 0 26px;max-width:520px;}
h2.onb-title{font-size:30px;font-weight:800;}
.goal-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.goal-card{display:flex;align-items:center;gap:16px;background:var(--surface);border:1px solid var(--line);border-radius:18px;padding:20px;text-align:left;transition:transform .14s,border-color .2s,box-shadow .2s;}
.goal-card:hover{transform:translateY(-3px);border-color:var(--ink);box-shadow:var(--shadow);}
.goal-ic{width:52px;height:52px;border-radius:14px;background:var(--ink);color:var(--volt);display:grid;place-items:center;flex-shrink:0;}
.goal-tag{font-size:10.5px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--volt-deep);}
.goal-card h3{font-size:18px;margin:3px 0 4px;}
.goal-card p{font-size:12.5px;color:var(--muted);line-height:1.4;}
.goal-arrow{margin-left:auto;color:var(--muted);flex-shrink:0;}

/* ---------- QUIZ ---------- */
.qp{display:flex;gap:6px;margin-bottom:24px;}
.qp-seg{flex:1;height:5px;border-radius:99px;background:var(--line);transition:background .3s;}
.qp-seg.on{background:var(--volt-deep);}
.quiz-title{font-size:26px;font-weight:800;margin-bottom:22px;}
.q-grid{display:flex;flex-direction:column;gap:20px;}
.q-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.q-row.three{grid-template-columns:1fr 1fr 1fr;}
.field{display:flex;flex-direction:column;gap:9px;}
.field>label{font-size:13.5px;font-weight:600;display:flex;gap:8px;align-items:center;}
.field>label em{font-style:normal;font-size:11.5px;color:var(--muted);font-weight:500;}
.inp{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:13px 15px;font-size:15px;width:100%;outline:none;transition:border-color .2s;}
.inp:focus{border-color:var(--ink);}
.numinput{display:flex;align-items:center;background:var(--surface);border:1px solid var(--line);border-radius:12px;overflow:hidden;}
.numinput button{width:46px;height:50px;background:var(--surface2);font-size:21px;font-weight:600;color:var(--ink);transition:background .15s;}
.numinput button:hover{background:var(--line);}
.num-val{flex:1;text-align:center;font-family:'Archivo';font-weight:700;font-size:17px;display:flex;align-items:baseline;justify-content:center;gap:4px;}
.num-val span{font-size:12px;color:var(--muted);font-weight:600;font-family:'Inter';}
.seg{display:flex;background:var(--surface2);border:1px solid var(--line);border-radius:12px;padding:4px;gap:4px;}
.seg-btn{flex:1;padding:11px;border-radius:9px;font-weight:600;font-size:13.5px;color:var(--ink2);transition:all .18s;}
.seg-btn.on{background:var(--ink);color:#fff;}
.opts{display:flex;flex-direction:column;gap:10px;}
.opt{display:flex;align-items:center;justify-content:space-between;background:var(--surface);border:1px solid var(--line);border-radius:13px;padding:14px 16px;text-align:left;transition:all .16s;}
.opt:hover{border-color:var(--ink2);}
.opt.on{background:var(--ink);color:#fff;border-color:var(--ink);}
.opt .ot{display:flex;flex-direction:column;gap:2px;}
.opt b{font-size:14px;font-weight:600;}
.opt small{font-size:12px;color:var(--muted);}
.opt.on small{color:rgba(255,255,255,.55);}
.opt.on .chk{color:var(--volt);}
.opts.cols{display:grid;grid-template-columns:1fr 1fr;}
.chips{display:flex;flex-wrap:wrap;gap:9px;}
.chip{background:var(--surface);border:1px solid var(--line);border-radius:99px;padding:9px 16px;font-size:13.5px;font-weight:500;color:var(--ink2);transition:all .16s;}
.chip:hover{border-color:var(--ink2);}
.chip.on{background:var(--ink);color:#fff;border-color:var(--ink);}
.days{display:flex;gap:10px;}
.day{flex:1;aspect-ratio:1.3;background:var(--surface);border:1px solid var(--line);border-radius:14px;font-family:'Archivo';font-weight:700;font-size:20px;color:var(--ink);transition:all .16s;}
.day.on{background:var(--ink);color:var(--volt);border-color:var(--ink);}
.quiz-foot{display:flex;justify-content:space-between;margin-top:30px;gap:12px;}

/* ---------- GENERATING ---------- */
.gen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px;}
.gen-pulse{width:88px;height:88px;border-radius:26px;background:var(--ink);color:var(--volt);display:grid;place-items:center;animation:pulse 1.6s ease-in-out infinite;}
@keyframes pulse{0%,100%{transform:scale(1);box-shadow:0 0 0 0 rgba(201,247,59,.4);}50%{transform:scale(1.06);box-shadow:0 0 0 22px rgba(201,247,59,0);}}
.gen h2{font-size:28px;margin-top:26px;}
.gen>p{margin:8px 0 30px;color:var(--muted);}
.gen-list{display:flex;flex-direction:column;gap:13px;width:100%;max-width:300px;text-align:left;}
.gen-item{display:flex;align-items:center;gap:12px;font-size:14px;color:var(--muted);opacity:.5;transition:all .3s;}
.gen-item.done{opacity:1;color:var(--ink);font-weight:500;}
.gen-dot{width:22px;height:22px;border-radius:50%;border:2px solid var(--line);display:grid;place-items:center;flex-shrink:0;color:var(--volt-deep);}
.gen-item.done .gen-dot{border-color:var(--volt-deep);background:var(--volt);}
.spin{width:10px;height:10px;border:2px solid var(--volt-deep);border-top-color:transparent;border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* ---------- APP SHELL ---------- */
.shell{display:grid;grid-template-columns:250px 1fr;min-height:100vh;}
.sidebar{background:var(--ink);color:#fff;padding:26px 18px;display:flex;flex-direction:column;position:sticky;top:0;height:100vh;}
.sb-brand{display:flex;align-items:center;gap:10px;font-family:'Archivo';font-weight:800;font-size:15px;padding:0 8px 26px;}
.sb-brand .brand-mark{background:var(--volt);color:var(--ink);}
.sb-nav{display:flex;flex-direction:column;gap:5px;}
.nav-item{display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:12px;font-size:14px;font-weight:600;color:rgba(255,255,255,.62);transition:all .16s;width:100%;text-align:left;}
.nav-item:hover{background:rgba(255,255,255,.06);color:#fff;}
.nav-item.on{background:var(--volt);color:var(--ink);}
.sb-bottom{margin-top:auto;display:flex;flex-direction:column;gap:12px;}
.sb-goal{background:rgba(255,255,255,.06);border-radius:14px;padding:14px;}
.sb-goal span{font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;color:rgba(255,255,255,.4);font-weight:700;}
.sb-goal b{font-family:'Archivo';font-size:16px;display:block;margin-top:3px;}
.sb-streak{display:flex;align-items:center;gap:10px;background:linear-gradient(135deg,var(--ember),var(--amber));border-radius:14px;padding:13px 15px;}
.sb-streak .sf{width:34px;height:34px;border-radius:10px;background:rgba(255,255,255,.22);display:grid;place-items:center;flex-shrink:0;}
.sb-streak b{font-family:'Archivo';font-size:16px;}
.sb-streak small{font-size:11px;opacity:.9;display:block;}

.main{min-width:0;}
.main-inner{max-width:1100px;margin:0 auto;padding:34px 40px 60px;}
.page-head{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:26px;flex-wrap:wrap;gap:14px;}
.page-head h1{font-size:30px;font-weight:800;}
.page-head .ph-sub{font-size:14px;color:var(--muted);margin-top:3px;}

/* ---------- CARDS / GRID ---------- */
.grid{display:grid;gap:16px;}
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:20px;}
.card-title{display:flex;align-items:center;gap:9px;font-family:'Archivo';font-weight:700;font-size:15px;margin-bottom:16px;}
.card-title svg{color:var(--volt-deep);}
.row-between{display:flex;justify-content:space-between;align-items:center;}
.row-between .card-title{margin-bottom:0;}
.pill{background:var(--ink);color:#fff;border-radius:99px;padding:4px 12px;font-size:12px;font-weight:700;font-family:'Archivo';}
.pill.ghost{background:var(--surface2);color:var(--ink2);border:1px solid var(--line);}
.card-note{font-size:12.5px;color:var(--muted);margin:-8px 0 14px;}

/* dashboard layout */
.dash{grid-template-columns:2fr 1fr;}
.dash .span2{grid-column:1 / -1;}
.trio{grid-template-columns:repeat(3,1fr);}
.duo{grid-template-columns:1fr 1fr;}

/* HERO card */
.herocard{background:var(--ink);color:#fff;border-radius:var(--r);padding:24px;position:relative;overflow:hidden;}
.herocard::before{content:"";position:absolute;top:-70px;right:-50px;width:230px;height:230px;background:radial-gradient(circle,var(--volt) 0%,transparent 70%);opacity:.16;}
.hc-head{display:flex;justify-content:space-between;align-items:flex-start;position:relative;}
.hc-eyebrow{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--volt-deep);font-weight:700;}
.hc-goal{font-size:28px;font-weight:800;color:#fff;margin-top:4px;}
.hc-stats{display:flex;align-items:center;gap:18px;margin-top:22px;position:relative;flex-wrap:wrap;}
.hc-stat{display:flex;flex-direction:column;gap:2px;}
.hc-stat span{font-size:10.5px;letter-spacing:.05em;text-transform:uppercase;color:rgba(255,255,255,.5);font-weight:600;}
.hc-stat b{font-family:'Archivo';font-size:22px;color:#fff;}
.hc-arrow{color:rgba(255,255,255,.4);}
.hc-eta{margin-left:auto;display:flex;align-items:center;gap:6px;background:rgba(201,247,59,.14);color:var(--volt);padding:8px 12px;border-radius:10px;font-family:'Archivo';font-weight:700;font-size:13px;}
.hc-next{display:flex;align-items:center;gap:12px;margin-top:22px;position:relative;}
.hc-next>span{font-size:11.5px;color:rgba(255,255,255,.55);font-weight:600;white-space:nowrap;}
.hc-next .barwrap{flex:1;}
.hc-next b{font-family:'Archivo';font-size:15px;}

/* RING */
.ring{position:relative;display:inline-grid;place-items:center;}
.ring>svg{transform:rotate(-90deg);}
.ring-c{position:absolute;inset:0;display:grid;place-items:center;text-align:center;line-height:1;}
.ring-c b{font-family:'Archivo';font-weight:800;}
.ring-c span{display:block;font-size:10px;color:var(--muted);}

/* BAR */
.barwrap{background:var(--line);border-radius:99px;overflow:hidden;}
.barwrap>i{display:block;height:100%;border-radius:99px;transition:width .8s cubic-bezier(.2,.8,.2,1);}

/* SPINE (Rota) */
.spine{display:flex;flex-direction:column;}
.spine-node{display:flex;align-items:center;gap:13px;position:relative;padding:8px 0;}
.spine-node:not(:last-child)::before{content:"";position:absolute;left:10px;top:29px;bottom:-8px;width:2px;background:var(--line);}
.spine-node.reached:not(:last-child)::before{background:var(--volt-deep);}
.spine-dot{width:22px;height:22px;border-radius:50%;border:2px solid var(--line);background:var(--surface);display:grid;place-items:center;flex-shrink:0;z-index:1;color:#fff;transition:all .3s;}
.spine-node.reached .spine-dot{background:var(--volt-deep);border-color:var(--volt-deep);}
.spine-node.next .spine-dot{border-color:var(--volt-deep);box-shadow:0 0 0 5px rgba(143,191,0,.15);animation:pulseDot 1.9s ease-in-out infinite;}
@keyframes pulseDot{0%,100%{box-shadow:0 0 0 5px rgba(143,191,0,.15);}50%{box-shadow:0 0 0 9px rgba(143,191,0,.04);}}
.spine-label b{font-family:'Archivo';font-size:14px;display:block;}
.spine-label span{font-size:11.5px;color:var(--muted);}
.spine-node:not(.reached) .spine-label b{color:var(--muted);}

/* TASKS */
.tasks{display:flex;flex-direction:column;gap:9px;margin-top:14px;}
.task{display:flex;align-items:center;gap:12px;background:var(--surface2);border:1px solid var(--line);border-radius:12px;padding:12px 14px;text-align:left;transition:all .16s;}
.task:hover{border-color:var(--ink2);}
.task.on{background:rgba(201,247,59,.1);border-color:var(--volt-deep);}
.task .tc{width:20px;height:20px;border-radius:6px;border:2px solid var(--line);display:grid;place-items:center;flex-shrink:0;color:#fff;transition:all .16s;}
.task.on .tc{background:var(--volt-deep);border-color:var(--volt-deep);}
.task .ti{color:var(--muted);flex-shrink:0;display:flex;}
.task.on .ti{color:var(--volt-deep);}
.task .tl{font-size:13.5px;font-weight:500;flex:1;}
.task.on .tl{text-decoration:line-through;color:var(--muted);}

/* NUTRI */
.nutri{display:flex;align-items:center;gap:22px;}
.macros{flex:1;display:flex;flex-direction:column;gap:13px;}
.mrow .mrt{display:flex;justify-content:space-between;font-size:12.5px;margin-bottom:6px;}
.mrow .mrt b{font-family:'Archivo';}
.mrow .mrb{height:6px;background:var(--line);border-radius:99px;overflow:hidden;}
.mrow .mrb>i{display:block;height:100%;border-radius:99px;transition:width .8s;}

/* NEXT WORKOUT */
.nw-title b{font-family:'Archivo';font-size:17px;}
.nw-title span{font-size:12.5px;color:var(--muted);display:block;margin-bottom:10px;}
.nw-row{display:flex;justify-content:space-between;font-size:13px;padding:9px 0;border-bottom:1px solid var(--line);}
.nw-row:last-of-type{border-bottom:none;}
.nw-row b{font-family:'Archivo';color:var(--ink2);}
.nw-more{font-size:12px;color:var(--volt-deep);font-weight:600;margin-top:6px;display:inline-block;}

/* STREAK card (dash) */
.streakbig{display:flex;align-items:center;gap:16px;background:linear-gradient(135deg,var(--ember),var(--amber));border-radius:var(--r);padding:20px;color:#fff;}
.streakbig .sf{width:54px;height:54px;border-radius:15px;background:rgba(255,255,255,.2);display:grid;place-items:center;flex-shrink:0;}
.streakbig b{font-family:'Archivo';font-size:19px;}
.streakbig p{font-size:13px;opacity:.94;margin-top:3px;line-height:1.4;}

/* BADGES */
.badges{display:flex;gap:14px;flex-wrap:wrap;}
.badge{display:flex;flex-direction:column;align-items:center;gap:7px;width:72px;opacity:.38;filter:grayscale(1);transition:all .3s;}
.badge.got{opacity:1;filter:none;}
.badge .bi{width:50px;height:50px;border-radius:15px;background:var(--surface2);border:1px solid var(--line);display:grid;place-items:center;color:var(--muted);}
.badge.got .bi{background:var(--volt);border-color:var(--volt-deep);color:var(--ink);}
.badge span{font-size:11px;font-weight:600;color:var(--ink2);text-align:center;}

/* PLAN page */
.eta{display:flex;gap:16px;align-items:center;background:var(--ink);color:#fff;border-radius:var(--r);padding:20px;}
.eta .ei{width:52px;height:52px;border-radius:14px;background:rgba(201,247,59,.15);color:var(--volt);display:grid;place-items:center;flex-shrink:0;}
.eta span{font-size:11px;letter-spacing:.05em;text-transform:uppercase;color:rgba(255,255,255,.55);font-weight:600;}
.eta b{font-family:'Archivo';font-size:19px;display:block;margin:3px 0;}
.eta p{font-size:12.5px;color:rgba(255,255,255,.6);}
.kcal-big{display:flex;align-items:baseline;gap:10px;}
.kcal-big b{font-family:'Archivo';font-size:46px;font-weight:900;line-height:.9;}
.kcal-big span{font-size:14px;color:var(--muted);}
.kcal-sub{display:flex;gap:10px;flex-wrap:wrap;font-size:12.5px;color:var(--muted);margin:10px 0 18px;}
.macro-cards{display:flex;gap:10px;}
.macro-c{flex:1;background:var(--surface2);border:1px solid var(--line);border-radius:14px;padding:14px;text-align:center;}
.macro-c i{display:inline-block;width:8px;height:8px;border-radius:50%;margin-bottom:4px;}
.macro-c b{font-family:'Archivo';font-size:22px;display:block;}
.macro-c span{font-size:11.5px;color:var(--muted);}
.meals{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.meal{background:var(--surface2);border:1px solid var(--line);border-radius:14px;padding:15px;}
.meal-head{display:flex;align-items:center;gap:8px;margin-bottom:7px;}
.meal-head b{font-family:'Archivo';font-size:14px;flex:1;}
.meal-kcal{font-family:'Archivo';font-size:12.5px;font-weight:700;color:var(--volt-deep);}
.meal-opt{font-size:13.5px;margin-bottom:5px;}
.meal-alt{font-size:11.5px;color:var(--muted);}
.day-tabs{display:flex;gap:7px;margin-bottom:16px;flex-wrap:wrap;}
.day-tab{background:var(--surface2);border:1px solid var(--line);border-radius:11px;padding:9px 15px;font-family:'Archivo';font-weight:700;font-size:13px;color:var(--ink2);transition:all .15s;}
.day-tab.on{background:var(--ink);color:var(--volt);border-color:var(--ink);}
.wd-head b{font-family:'Archivo';font-size:17px;}
.wd-head span{font-size:12.5px;color:var(--muted);display:block;margin-bottom:8px;}
.wd-row{display:flex;align-items:center;gap:14px;padding:12px 0;border-bottom:1px solid var(--line);font-size:14px;}
.wd-row:last-child{border-bottom:none;}
.wd-num{width:24px;height:24px;border-radius:8px;background:var(--surface2);border:1px solid var(--line);display:grid;place-items:center;font-family:'Archivo';font-size:11px;font-weight:700;color:var(--ink2);flex-shrink:0;}
.wd-name{flex:1;}
.wd-row b{font-family:'Archivo';color:var(--ink2);}
.ministat{background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:18px;text-align:center;}
.ministat .mi-ic{margin-bottom:6px;display:inline-flex;}
.ministat b{font-family:'Archivo';font-size:20px;display:block;}
.ministat span{font-size:12px;color:var(--muted);}
.recs{list-style:none;display:flex;flex-direction:column;gap:12px;}
.recs li{display:flex;gap:11px;font-size:13.5px;color:var(--ink2);line-height:1.45;}
.rec-dot{width:6px;height:6px;border-radius:50%;background:var(--volt-deep);margin-top:7px;flex-shrink:0;}

/* PROGRESS */
.prog-summary{display:flex;}
.ps{flex:1;text-align:center;border-right:1px solid var(--line);}
.ps:last-child{border-right:none;}
.ps span{font-size:11.5px;color:var(--muted);}
.ps b{font-family:'Archivo';font-size:22px;display:block;margin-top:3px;}
.measure-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.measure{background:var(--surface2);border:1px solid var(--line);border-radius:13px;padding:14px;}
.measure span{font-size:12px;color:var(--muted);}
.measure b{font-family:'Archivo';font-size:19px;display:block;margin-top:2px;}
.empty{text-align:center;font-size:13.5px;color:var(--muted);padding:26px;line-height:1.5;background:var(--surface2);border:1px dashed var(--line);border-radius:14px;}
.photos{display:flex;gap:12px;flex-wrap:wrap;}
.photo img{width:120px;height:150px;object-fit:cover;border-radius:13px;border:1px solid var(--line);display:block;}
.photo span{font-size:11.5px;color:var(--muted);text-align:center;display:block;margin-top:6px;}
.badges-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:12px;}
.badge-lg{background:var(--surface2);border:1px solid var(--line);border-radius:15px;padding:16px;text-align:center;opacity:.5;filter:grayscale(1);}
.badge-lg.got{opacity:1;filter:none;background:rgba(201,247,59,.07);border-color:var(--volt-deep);}
.badge-lg .bli{width:46px;height:46px;border-radius:13px;background:var(--surface);border:1px solid var(--line);display:inline-grid;place-items:center;color:var(--muted);margin-bottom:8px;}
.badge-lg.got .bli{background:var(--volt);color:var(--ink);border-color:var(--volt-deep);}
.badge-lg b{font-family:'Archivo';font-size:13.5px;display:block;}
.badge-lg span{font-size:11px;color:var(--muted);}

/* LOG */
.log-weight{display:flex;gap:12px;}
.log-weight .inp{flex:1;}
.water-count{display:flex;align-items:baseline;gap:7px;margin-bottom:12px;}
.water-count b{font-family:'Archivo';font-size:30px;color:var(--teal);}
.water-count span{font-size:13px;color:var(--muted);}
.cups{display:flex;gap:6px;flex-wrap:wrap;margin:14px 0;}
.cup{width:26px;height:34px;border-radius:5px 5px 8px 8px;border:2px solid var(--line);background:var(--surface2);transition:all .2s;}
.cup.on{background:var(--teal);border-color:var(--teal);}
.log-actions{display:flex;flex-direction:column;gap:11px;}
.log-action{display:flex;align-items:center;gap:14px;background:var(--surface);border:1px solid var(--line);border-radius:15px;padding:15px 17px;text-align:left;transition:all .16s;}
.log-action:hover{border-color:var(--ink2);}
.log-action.done{background:rgba(201,247,59,.09);border-color:var(--volt-deep);}
.la-ic{width:40px;height:40px;border-radius:12px;background:var(--surface2);display:grid;place-items:center;color:var(--ink2);flex-shrink:0;}
.log-action.done .la-ic{background:var(--volt);color:var(--ink);}
.log-action .lal{flex:1;font-size:14.5px;font-weight:600;}
.la-plus{color:var(--muted);}
.la-check{color:var(--volt-deep);}
.measure-inputs{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.mi-field{display:flex;flex-direction:column;gap:7px;}
.mi-field>span{font-size:12.5px;font-weight:600;color:var(--ink2);}

/* TOAST */
.toast-wrap{position:fixed;bottom:26px;left:50%;transform:translateX(-50%);z-index:200;display:flex;flex-direction:column;gap:10px;align-items:center;pointer-events:none;}
.toast{background:var(--ink);color:#fff;border-radius:14px;padding:14px 18px;display:flex;align-items:center;gap:12px;box-shadow:0 18px 40px -12px rgba(0,0,0,.5);animation:toastIn .3s cubic-bezier(.2,.8,.2,1);max-width:90vw;}
.toast .tk{width:32px;height:32px;border-radius:9px;background:var(--volt);color:var(--ink);display:grid;place-items:center;flex-shrink:0;}
.toast span{font-size:13.5px;font-weight:500;}
@keyframes toastIn{from{transform:translateY(16px);opacity:0;}to{transform:translateY(0);opacity:1;}}

/* MOBILE NAV */
.mobile-nav{display:none;}

/* ---------- RESPONSIVE ---------- */
@media(max-width:1000px){
  .dash,.trio{grid-template-columns:1fr;}
  .duo{grid-template-columns:1fr;}
}
@media(max-width:860px){
  .hero-web{grid-template-columns:1fr;}
  .hero-right{display:none;}
  .hero-left{padding:90px 32px 50px;min-height:100vh;}
  .goal-grid{grid-template-columns:1fr;}
  .q-row,.q-row.three{grid-template-columns:1fr;}
  .opts.cols{grid-template-columns:1fr;}
  .meals,.measure-grid,.measure-inputs{grid-template-columns:1fr;}
  .shell{grid-template-columns:1fr;}
  .sidebar{display:none;}
  .main-inner{padding:24px 18px 96px;}
  .page-head h1{font-size:24px;}
  .mobile-nav{display:flex;position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--line);padding:9px 6px calc(9px + env(safe-area-inset-bottom));z-index:100;}
  .mnav{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px;color:var(--muted);}
  .mnav span{font-size:10.5px;font-weight:600;}
  .mnav.on{color:var(--ink);}
  .mnav.on svg{color:var(--volt-deep);}
  .onb-nav{padding:18px 20px;}
  .onb-body{padding:16px;}
  h2.onb-title,.quiz-title{font-size:24px;}
}
/* ---------- NUTRI / FOOD LOG ---------- */
.nutri-remain{margin-top:14px;padding-top:14px;border-top:1px solid var(--line);font-size:13px;color:var(--ink2);}
.nutri-remain b{font-family:'Archivo';}
.nutri-remain svg{vertical-align:-2px;color:var(--volt-deep);}
.meal-photo-card{background:linear-gradient(135deg,#191c23,#14161c);color:#fff;margin-bottom:16px;border:none;}
.meal-photo-card .card-title{color:#fff;}
.meal-photo-card .card-title svg{color:var(--volt);}
.meal-photo-card .card-note{color:rgba(255,255,255,.6);}
.meal-photo-card .pill{background:var(--volt);color:var(--ink);}
.food-list{display:flex;flex-direction:column;gap:9px;margin-top:6px;}
.food-item{display:flex;align-items:center;gap:12px;background:var(--surface2);border:1px solid var(--line);border-radius:13px;padding:9px 11px;}
.food-thumb{width:46px;height:46px;border-radius:10px;background-size:cover;background-position:center;flex-shrink:0;}
.food-thumb.ph{display:grid;place-items:center;color:var(--muted);background:var(--surface);border:1px solid var(--line);}
.food-meta{flex:1;min-width:0;}
.food-meta b{font-family:'Archivo';font-size:14px;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.food-meta span{font-size:11.5px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:block;}
.food-kcal{text-align:right;flex-shrink:0;}
.food-kcal b{font-family:'Archivo';font-size:16px;}
.food-kcal span{font-size:10.5px;color:var(--muted);display:block;}
.food-del{width:28px;height:28px;border-radius:8px;color:var(--muted);display:grid;place-items:center;flex-shrink:0;transition:all .15s;}
.food-del:hover{background:var(--line);color:var(--ink);}

/* ---------- MODAL ---------- */
.modal-overlay{position:fixed;inset:0;background:rgba(12,14,18,.6);backdrop-filter:blur(4px);z-index:300;display:none;align-items:center;justify-content:center;padding:20px;}
.modal-overlay.show{display:flex;animation:fadeIn .2s;}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal-card{background:var(--surface);border-radius:22px;width:100%;max-width:420px;max-height:90vh;overflow-y:auto;position:relative;box-shadow:0 40px 90px -30px rgba(0,0,0,.6);animation:modalIn .28s cubic-bezier(.2,.8,.2,1);}
@keyframes modalIn{from{transform:translateY(24px) scale(.98);opacity:0}to{transform:none;opacity:1}}
.modal-x{position:absolute;top:12px;right:12px;width:34px;height:34px;border-radius:10px;background:rgba(0,0,0,.4);color:#fff;display:grid;place-items:center;z-index:2;backdrop-filter:blur(4px);}
.modal-x:hover{background:rgba(0,0,0,.6);}
.analyze-img{width:100%;height:210px;background-size:cover;background-position:center;background-color:var(--surface2);}
.modal-pad{padding:20px;}
.analyze-loading{text-align:center;padding:20px 0;}
.analyze-loading b{font-family:'Archivo';font-size:17px;display:block;margin-top:14px;}
.analyze-loading p{font-size:13px;color:var(--muted);margin-top:5px;}
.spin.big{width:30px;height:30px;border-width:3px;display:inline-block;}
.analyze-dish{font-size:21px;font-weight:800;}
.analyze-items{font-size:13px;color:var(--muted);margin-top:5px;line-height:1.4;}
.analyze-kcal-row{display:flex;align-items:center;gap:12px;margin-top:16px;}
.analyze-kcal{display:flex;align-items:baseline;gap:8px;}
.analyze-kcal b{font-family:'Archivo';font-size:40px;font-weight:900;line-height:.9;color:var(--volt-deep);}
.analyze-kcal span{font-size:13px;color:var(--muted);}
.conf{margin-left:auto;font-size:11px;font-weight:700;padding:5px 10px;border-radius:99px;background:var(--surface2);border:1px solid var(--line);color:var(--ink2);text-transform:capitalize;white-space:nowrap;}
.conf-alta{background:rgba(143,191,0,.14);border-color:var(--volt-deep);color:var(--volt-deep);}
.conf-baixa{background:rgba(255,122,69,.14);border-color:var(--ember);color:var(--ember);}
.analyze-note{font-size:12.5px;color:var(--ink2);background:var(--surface2);border-radius:11px;padding:11px 13px;margin-top:14px;line-height:1.45;}
.analyze-note svg{vertical-align:-2px;color:var(--volt-deep);}
.analyze-disc{font-size:11px;color:var(--muted);text-align:center;margin-top:12px;}
.modal-actions{display:flex;gap:10px;margin-top:16px;}
.modal-actions .btn{flex:1;}
.analyze-error{text-align:center;padding:8px 0 4px;}
.analyze-error .ae-ic{width:52px;height:52px;border-radius:15px;background:var(--surface2);border:1px solid var(--line);display:inline-grid;place-items:center;color:var(--muted);margin-bottom:12px;}
.analyze-error b{font-family:'Archivo';font-size:17px;display:block;}
.analyze-error p{font-size:13px;color:var(--muted);margin-top:6px;line-height:1.5;}
@media(max-width:860px){.analyze-img{height:180px;}}

/* ---------- CONTA / LOGIN ---------- */
.auth-card{max-width:440px;margin:0 auto;text-align:center;}
.auth-badge{width:60px;height:60px;border-radius:18px;background:var(--volt);color:var(--ink);display:inline-grid;place-items:center;margin-bottom:16px;box-shadow:0 12px 30px -12px rgba(143,191,0,.6);}
.google-btn{width:100%;display:flex;align-items:center;justify-content:center;gap:11px;background:var(--surface);border:1px solid #dadce0;border-radius:13px;padding:14px;font-family:'Inter';font-weight:600;font-size:15px;color:#3c4043;transition:box-shadow .18s,background .18s;}
.google-btn:hover{box-shadow:0 2px 8px rgba(60,64,67,.18);background:#f8faff;}
.auth-or{display:flex;align-items:center;gap:12px;color:var(--muted);font-size:12px;margin:20px 0;}
.auth-or::before,.auth-or::after{content:"";flex:1;height:1px;background:var(--line);}
.auth-card .field{text-align:left;}
.auth-disc{font-size:11.5px;color:var(--muted);margin-top:16px;line-height:1.5;}
.sb-user{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,.06);border-radius:14px;padding:10px 12px;}
.sb-avatar{width:34px;height:34px;border-radius:50%;background:#fff;display:grid;place-items:center;flex-shrink:0;font-family:'Archivo';font-weight:800;color:var(--ink);font-size:15px;}
.sb-user-meta{flex:1;min-width:0;}
.sb-user-meta b{font-size:13px;color:#fff;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sb-user-meta small{font-size:11px;color:rgba(255,255,255,.5);display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sb-signout{width:30px;height:30px;border-radius:9px;color:rgba(255,255,255,.6);display:grid;place-items:center;flex-shrink:0;transition:all .15s;}
.sb-signout:hover{background:rgba(255,255,255,.1);color:#fff;}
/* modal Google */
.gcard{max-width:400px;}
.gcard-head{display:flex;align-items:center;gap:10px;padding:16px 20px;border-bottom:1px solid var(--line);font-size:14px;color:#3c4043;font-weight:500;}
.gcard-body{padding:22px 24px 24px;}
.gcard-body h3{font-size:20px;font-weight:700;}
.gcard-body>p{font-size:13.5px;color:var(--muted);margin-top:4px;}
.gcard-body .field{text-align:left;}
.gcard-disc{font-size:11px;color:var(--muted);text-align:center;margin-top:14px;line-height:1.5;}
.local-warn{display:flex;gap:9px;text-align:left;background:rgba(255,176,32,.1);border:1px solid var(--amber);border-radius:12px;padding:12px 14px;margin-top:14px;font-size:12px;line-height:1.5;color:var(--ink2);}
.local-warn svg{color:var(--amber);flex-shrink:0;margin-top:1px;}

@keyframes fadeUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}
.card{box-shadow:0 1px 2px rgba(20,22,28,.03),0 14px 34px -26px rgba(20,22,28,.22);}
.nav-item.on{box-shadow:0 8px 18px -10px rgba(201,247,59,.7);}
.mobile-nav{background:rgba(255,255,255,.9);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);}
.btn-primary,.btn-volt{letter-spacing:.005em;}
.sec-row{margin:24px 0 12px;}
.sec-h{font-size:18px;font-weight:800;}

.icon-btn:hover{background:var(--line);color:var(--ink);}

.fr-macros .mc{background:rgba(143,191,0,.18);color:var(--volt-deep);}

.add-line:hover{border-color:var(--volt-deep);color:var(--volt-deep);background:rgba(201,247,59,.06);}

.edit-grid .span2{grid-column:1 / -1;}
/* treinos */
.week-stats{display:flex;gap:12px;margin-bottom:16px;}
.ws{flex:1;background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:14px;text-align:center;box-shadow:0 1px 2px rgba(20,22,28,.03);}
.ws b{font-family:'Archivo';font-size:22px;display:block;}
.ws span{font-size:11.5px;color:var(--muted);}
.week-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;align-items:start;}
.day-card{padding:16px 18px;display:flex;flex-direction:column;}
.day-card.rest{background:var(--surface2);}
.day-card.done{border-color:var(--volt-deep);background:rgba(201,247,59,.05);}
.day-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:5px;}
.day-name b{font-family:'Archivo';font-size:16px;display:block;}
.day-name span{font-size:12.5px;color:var(--muted);}
.rest-ic{color:var(--muted);}
.done-btn{width:34px;height:34px;border-radius:10px;background:var(--surface2);border:1px solid var(--line);display:grid;place-items:center;color:var(--muted);transition:all .18s;flex-shrink:0;}
.done-btn.on{background:var(--volt-deep);border-color:var(--volt-deep);color:#fff;}
.day-sub{font-size:11.5px;color:var(--muted);margin-bottom:12px;}
.ex-rows{display:flex;flex-direction:column;gap:7px;flex:1;}
.ex-row{display:flex;align-items:center;gap:8px;background:var(--surface2);border:1px solid var(--line);border-radius:11px;padding:8px 10px;}
.ex-reorder{display:flex;flex-direction:column;gap:2px;flex-shrink:0;}
.ro{width:20px;height:15px;border-radius:5px;background:var(--surface);border:1px solid var(--line);display:grid;place-items:center;color:var(--ink2);}
.ro:disabled{opacity:.3;}
.ro svg{transform:rotate(90deg);}
.ro.dn svg{transform:rotate(-90deg);}
.ex-main{flex:1;min-width:0;}
.ex-main b{font-size:13px;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ex-main span{font-size:11px;color:var(--muted);}
.ex-act{display:flex;gap:5px;flex-shrink:0;}
.day-actions{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-top:12px;}
.day-actions .add-line{width:auto;margin-top:0;flex:1;}
.day-actions-right{display:flex;gap:5px;flex-shrink:0;}
.copy-days{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:14px;}
.copy-day{background:var(--surface2);border:1px solid var(--line);border-radius:12px;padding:12px;text-align:left;transition:all .15s;}
.copy-day:hover{border-color:var(--ink);}
.copy-day b{font-family:'Archivo';font-size:14px;display:block;}
.copy-day em{font-style:normal;font-size:11px;color:var(--muted);}
@media(max-width:1000px){.week-grid{grid-template-columns:1fr;}}
@media(max-width:520px){.fr-macros .mp,.fr-macros .mc,.fr-macros .mf{display:none;}.edit-grid,.copy-days,.mini-grid-2{grid-template-columns:1fr;}.week-stats{gap:8px;}}

/* ---------- ANALISADOR DE ALIMENTOS ---------- */
.micro-line{display:flex;flex-wrap:wrap;gap:6px 14px;margin-top:12px;padding-top:12px;border-top:1px solid var(--line);font-size:11.5px;color:var(--muted);}
.micro-line span{display:inline-flex;align-items:center;gap:4px;}
.micro-line b{color:var(--ink);font-family:'Archivo';}
.micro-line svg{color:var(--volt-deep);}
.meal-add-row{display:flex;gap:8px;margin-top:10px;}
.meal-add-row .add-line{margin-top:0;}
.add-line.primary{flex:1;border:none;background:var(--ink);color:#fff;font-weight:700;}
.add-line.primary:hover{background:#000;color:#fff;}
.meal-add-row .add-line:not(.primary){flex:0 0 auto;padding-left:16px;padding-right:16px;}
.modal-card.analyzer{max-width:540px;width:100%;max-height:88vh;display:flex;flex-direction:column;}
.modal-card.analyzer .modal-pad{overflow-y:auto;}
.az-head{display:flex;align-items:center;gap:12px;margin-bottom:16px;}
.az-badge{display:inline-flex;align-items:center;gap:5px;background:var(--volt);color:var(--ink);font-weight:800;font-size:12px;padding:6px 10px;border-radius:9px;flex-shrink:0;}
.az-searchbar{display:flex;align-items:center;gap:10px;background:var(--surface2);border:1.5px solid var(--line);border-radius:14px;padding:0 14px;transition:border-color .15s;}

.az-searchbar svg{color:var(--muted);flex-shrink:0;}
.az-input{flex:1;border:none;background:none;padding:13px 0;font-size:15px;font-family:'Inter';color:var(--ink);outline:none;}
.az-tabs{display:flex;gap:6px;margin:14px 0;overflow-x:auto;-webkit-overflow-scrolling:touch;}
.az-tab{flex-shrink:0;padding:7px 14px;border-radius:999px;background:var(--surface2);border:1px solid var(--line);font-size:12.5px;font-weight:600;color:var(--ink2);transition:all .15s;}
.az-tab.on{background:var(--ink);color:#fff;border-color:var(--ink);}
.az-results{display:flex;flex-direction:column;gap:6px;max-height:230px;overflow-y:auto;}
.az-item{display:flex;align-items:center;gap:10px;background:var(--surface2);border:1.5px solid var(--line);border-radius:12px;padding:11px 13px;cursor:pointer;transition:all .13s;text-align:left;}
.az-item:hover{border-color:var(--ink2);}
.az-item.sel{border-color:var(--volt-deep);background:rgba(201,247,59,.08);}
.azi-main{flex:1;min-width:0;}
.azi-main b{display:block;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.azi-main span{font-size:11.5px;color:var(--muted);}
.azi-tag{font-style:normal;font-size:9.5px;background:var(--volt);color:var(--ink);padding:1px 5px;border-radius:5px;font-weight:800;vertical-align:middle;}
.azi-fav{width:30px;height:30px;border-radius:8px;display:grid;place-items:center;color:#c4c8d4;background:none;border:none;flex-shrink:0;transition:color .15s,transform .15s;}
.azi-fav:hover{transform:scale(1.15);}
.azi-fav.on{color:var(--amber);}
.azi-fav.on svg{fill:var(--amber);}
.az-empty{text-align:center;padding:18px 10px;color:var(--muted);font-size:13px;}
.az-hint{display:flex;align-items:center;gap:7px;justify-content:center;color:var(--muted);font-size:12.5px;padding:14px;}
.az-hint svg{color:var(--muted);}
.az-chips{display:flex;flex-wrap:wrap;gap:8px;}
.az-chip{display:inline-flex;align-items:center;gap:5px;background:var(--surface2);border:1px solid var(--line);border-radius:999px;padding:8px 13px;font-size:12.5px;color:var(--ink2);transition:all .15s;}
.az-chip:hover{border-color:var(--ink);color:var(--ink);}
.az-detail{margin-top:14px;}
.azd-top{display:flex;justify-content:space-between;align-items:baseline;gap:10px;margin-bottom:12px;}
.azd-top b{font-family:'Archivo';font-size:16px;}
.azd-top span{font-size:12px;color:var(--muted);flex-shrink:0;}
.azd-controls{display:flex;gap:10px;margin-bottom:14px;}
.azd-qty{display:flex;align-items:center;background:var(--surface2);border:1.5px solid var(--line);border-radius:12px;overflow:hidden;}
.qbtn{width:40px;height:44px;font-size:20px;font-weight:600;color:var(--ink);background:none;border:none;transition:background .12s;}
.qbtn:hover{background:var(--line);}
.az-qtyinp{width:64px;text-align:center;border:none;background:none;font-size:16px;font-family:'Archivo';font-weight:700;color:var(--ink);outline:none;-moz-appearance:textfield;}
.az-qtyinp::-webkit-outer-spin-button,.az-qtyinp::-webkit-inner-spin-button{-webkit-appearance:none;margin:0;}
.az-unit{flex:1;border:1.5px solid var(--line);border-radius:12px;background:var(--surface2);padding:0 14px;font-size:14px;font-family:'Inter';color:var(--ink);outline:none;}
.azd-summary{margin-top:4px;}
.nut-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
.nut{background:var(--surface2);border:1px solid var(--line);border-radius:12px;padding:11px 8px;text-align:center;}
.nut b{display:block;font-family:'Archivo';font-size:16px;line-height:1.1;}
.nut span{font-size:9.5px;color:var(--muted);display:block;margin-top:3px;}
.az-added{margin-top:12px;display:flex;align-items:center;gap:7px;justify-content:center;background:rgba(201,247,59,.14);border:1px solid var(--volt-deep);border-radius:11px;padding:10px;font-size:12.5px;font-weight:600;color:var(--volt-deep);}
.az-added svg{color:var(--volt-deep);}
.btn.sm{padding:8px 14px;font-size:13px;}
@media(max-width:520px){.nut-grid{grid-template-columns:repeat(2,1fr);}.azd-controls{flex-direction:column;}}

@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important;}}

/* ============================================================

const GOALS = {
  emagrecimento:{key:'emagrecimento',label:'Emagrecimento',icon:'flame',tag:'Perder gordura',desc:'Reduzir percentual de gordura preservando massa magra.',deficit:-0.2,proteinPerKg:2.0,fatPerKg:0.8,steps:11000},

  recomposicao:{key:'recomposicao',label:'Recomposição',icon:'target',tag:'Trocar gordura por músculo',desc:'Perder gordura e ganhar músculo ao mesmo tempo.',deficit:-0.05,proteinPerKg:2.2,fatPerKg:0.9,steps:9500},

const ACTIVITY=[

function computePlan(g,a){
  const goal=GOALS[g], w=a.weight, h=a.height, age=a.age;
  const bmr=a.sex==='M'?10*w+6.25*h-5*age+5:10*w+6.25*h-5*age-161;
  const act=ACTIVITY.find(x=>x.key===a.activity)||ACTIVITY[0];
  const tdee=Math.round(bmr*act.mult);
  const target=Math.round(tdee*(1+goal.deficit));
  const protein_g=Math.round(goal.proteinPerKg*w);
  const fat_g=Math.round(goal.fatPerKg*w);
  const carb_kcal=Math.max(target-protein_g*4-fat_g*9,200);
  const carb_g=Math.round(carb_kcal/4);
  let timeEstimate=null;
  if(a.targetWeight&&Math.abs(a.targetWeight-w)>0.5){
    const diff=Math.abs(a.targetWeight-w);
    const dailyDelta=Math.abs(tdee-target);
    let kgWeek=(dailyDelta*7)/7700;
    kgWeek=Math.min(Math.max(kgWeek,0.25),g==='massa'?0.4:0.9);
    const weeks=Math.max(2,Math.ceil(diff/kgWeek));
    timeEstimate={weeks,months:Math.round((weeks/4.33)*10)/10,diff,kgWeek:Math.round(kgWeek*100)/100};
  }
  const water=Math.round(w*0.035*10)/10;
  const steps=Math.round((goal.steps*(0.85+act.mult/12))/500)*500;
  const restDays=7-a.trainingDays;
  let dietKey='onivoro';

  else if(a.restrictions.includes('Vegetariano'))dietKey='vegetariano';
  const db=MEAL_DB[dietKey];
  const seed=((a.name&&a.name.length)||3)+age;
  const meals=MEAL_SPLIT.map((m,i)=>{
    const opts=db[m.name], pick=opts[(seed+i)%opts.length];
    return {name:m.name,icon:m.icon,kcal:Math.round(target*m.pct),option:pick,alts:opts.filter(o=>o!==pick)};
  });
  const workout=buildWorkout(a.trainingDays,a.equipment,a.experience,a.time);
  const recs=buildRecs(g,a);
  return {goal,bmr:Math.round(bmr),tdee,target,macros:{protein_g,carb_g,fat_g},timeEstimate,water,steps,restDays,dietKey,meals,workout,recs,startWeight:w,targetWeight:a.targetWeight||null};
}
function buildWorkout(days,eq,exp,time){
  const setsBase=exp==='iniciante'?3:4;
  const reps=exp==='iniciante'?'10–12':'8–12';
  const exCount=time<=30?4:time<=45?5:6;
  const S=m=>({name:exn(m,eq),sets:setsBase,reps});
  const FULL=['peito','costas','quadriceps','posterior','ombro','abdomen'];
  const templates={
    2:[{title:'Corpo inteiro A',focus:'Full body',muscles:['peito','costas','quadriceps','biceps','abdomen','ombro']},
       {title:'Corpo inteiro B',focus:'Full body',muscles:['ombro','posterior','gluteo','triceps','costas','abdomen']}],
    3:[{title:'Empurrar',focus:'Peito • Ombro • Tríceps',muscles:['peito','ombro','triceps','abdomen']},
       {title:'Puxar',focus:'Costas • Bíceps',muscles:['costas','biceps','posterior','abdomen']},
       {title:'Pernas',focus:'Inferiores',muscles:['quadriceps','posterior','gluteo','abdomen']}],
    4:[{title:'Superiores A',focus:'Peito • Costas',muscles:['peito','costas','ombro','biceps']},
       {title:'Inferiores A',focus:'Quadríceps',muscles:['quadriceps','gluteo','posterior','abdomen']},
       {title:'Superiores B',focus:'Ombro • Braços',muscles:['ombro','triceps','biceps','costas']},
       {title:'Inferiores B',focus:'Posterior • Glúteo',muscles:['posterior','gluteo','quadriceps','abdomen']}],
    5:[{title:'Empurrar',focus:'Peito • Ombro • Tríceps',muscles:['peito','ombro','triceps']},
       {title:'Puxar',focus:'Costas • Bíceps',muscles:['costas','biceps','posterior']},
       {title:'Pernas',focus:'Inferiores',muscles:['quadriceps','posterior','gluteo']},
       {title:'Superiores',focus:'Torso',muscles:['peito','costas','ombro']},
       {title:'Core & Glúteo',focus:'Estabilidade',muscles:['gluteo','abdomen','posterior']}],
    6:[{title:'Empurrar A',focus:'Peito',muscles:['peito','ombro','triceps']},
       {title:'Puxar A',focus:'Costas',muscles:['costas','biceps','abdomen']},
       {title:'Pernas A',focus:'Quadríceps',muscles:['quadriceps','gluteo','posterior']},
       {title:'Empurrar B',focus:'Ombro',muscles:['ombro','peito','triceps']},
       {title:'Puxar B',focus:'Bíceps',muscles:['costas','biceps','posterior']},
       {title:'Pernas B',focus:'Posterior',muscles:['posterior','gluteo','abdomen']}],
  };
  const t=templates[days]||templates[3];
  return t.map(d=>{
    let muscles=d.muscles.slice(0,exCount);
    while(muscles.length<exCount)muscles.push(FULL[muscles.length%FULL.length]);
    return Object.assign({},d,{exercises:muscles.map(S)});
  });
}
function buildRecs(g,a){
  const base=['Priorize o sono: 7–9h por noite aceleram a recuperação e o resultado.','Beba água ao longo do dia, não tudo de uma vez.','Registre o peso sempre no mesmo horário, de preferência em jejum.'];
  const byGoal={
    emagrecimento:['Mantenha a proteína alta para preservar músculo no déficit.','Caminhadas diárias somam muito no gasto calórico.'],
    massa:['Não pule refeições: o superávit consistente é o que constrói músculo.','Progrida as cargas semana a semana.'],
    secagem:['Controle o sal e capriche na água nos dias finais.','Mantenha o treino de força para não perder volume.'],
    recomposicao:['Seja paciente: a recomposição é lenta, mas duradoura.','Foque em performance no treino como métrica de progresso.'],
  };
  const out=(byGoal[g]||[]).concat(base);
  if(a.experience==='iniciante')out.push('Comece leve e foque na execução correta antes de aumentar carga.');
  return out;
}

const STORE=(()=>{
  const ws=(typeof window!=='undefined'&&window.storage&&typeof window.storage.get==='function')?window.storage:null;
  return {
    kind: ws?'nuvem':'local',
    async get(k){try{if(ws){const r=await ws.get(k);return r?r.value:null;}return localStorage.getItem(k);}catch(e){return null;}},
    async set(k,v){try{if(ws){await ws.set(k,v);return true;}localStorage.setItem(k,v);return true;}catch(e){return false;}},
    async del(k){try{if(ws){await ws.delete(k);return;}localStorage.removeItem(k);}catch(e){}},
  };
})();
const SESSION_KEY='transform:session';
let _saveT=null;
function saveSession(){if(!S.user)return;clearTimeout(_saveT);_saveT=setTimeout(doSave,450);}
async function doSave(){

      foodLog:S.foodLog.map(f=>Object.assign({},f,{url:null}))}};
  await STORE.set(SESSION_KEY,JSON.stringify(data));
}
async function loadSession(){

  try{

    S.user=d.user; S.goalKey=d.goalKey; S.answers=d.answers||S.answers; S.plan=d.plan;

const $=s=>document.querySelector(s);
const root=()=>document.getElementById('root');
const nf=n=>n.toLocaleString('pt-BR');
function ring(pct,o){
  o=o||{}; const size=o.size||84, stroke=o.stroke||9, color=o.color||'var(--volt-deep)', track=o.track||'var(--line)';
  const r=(size-stroke)/2, c=2*Math.PI*r, off=c-Math.min(pct,100)/100*c;
  return `<div class="ring" style="width:${size}px;height:${size}px">
    <svg width="${size}" height="${size}">
      <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${track}" stroke-width="${stroke}"/>
      <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${color}" stroke-width="${stroke}" stroke-dasharray="${c}" stroke-dashoffset="${off}" stroke-linecap="round"/>
    </svg>
    <div class="ring-c">${o.center||''}</div></div>`;
}
function bar(pct,color,h){
  return `<div class="barwrap" style="height:${h||8}px"><i style="width:${Math.min(pct,100)}%;background:${color||'var(--volt-deep)'}"></i></div>`;
}
function weightChart(log,target){
  const W=560,H=210,pl=36,pr=16,pt=18,pb=28;
  const vals=log.map(p=>p.v);
  let min=Math.min.apply(null,vals), max=Math.max.apply(null,vals);
  if(target!=null){min=Math.min(min,target);max=Math.max(max,target);}
  min-=1;max+=1; if(min===max){min-=1;max+=1;}
  const x=i=>pl+(log.length<=1?0.5:(i/(log.length-1)))*(W-pl-pr);
  const y=v=>pt+(1-(v-min)/(max-min))*(H-pt-pb);
  const pts=log.map((p,i)=>[x(i),y(p.v)]);
  const line=pts.map((p,i)=>(i?'L':'M')+p[0].toFixed(1)+' '+p[1].toFixed(1)).join(' ');
  const area=`M${pts[0][0].toFixed(1)} ${(H-pb).toFixed(1)} `+pts.map(p=>'L'+p[0].toFixed(1)+' '+p[1].toFixed(1)).join(' ')+` L${pts[pts.length-1][0].toFixed(1)} ${(H-pb).toFixed(1)} Z`;
  let ticks='';
  [max-1,(max+min)/2,min+1].forEach(v=>{ticks+=`<line x1="${pl}" x2="${W-pr}" y1="${y(v).toFixed(1)}" y2="${y(v).toFixed(1)}" stroke="var(--line)" stroke-dasharray="3 3"/><text x="4" y="${(y(v)+3).toFixed(1)}" font-size="10" fill="var(--muted)">${v.toFixed(0)}</text>`;});
  let tline='';
  if(target!=null){const ty=y(target).toFixed(1);tline=`<line x1="${pl}" x2="${W-pr}" y1="${ty}" y2="${ty}" stroke="var(--muted)" stroke-width="1.5" stroke-dasharray="5 5"/><text x="${W-pr}" y="${(target<max?y(target)-5:y(target)+12).toFixed(1)}" text-anchor="end" font-size="10" fill="var(--muted)">meta ${target}kg</text>`;}
  const dots=pts.map((p,i)=>`<circle cx="${p[0].toFixed(1)}" cy="${p[1].toFixed(1)}" r="3.5" fill="#fff" stroke="var(--volt-deep)" stroke-width="2"/>`).join('');
  const labels=log.map((p,i)=>`<text x="${x(i).toFixed(1)}" y="${H-8}" text-anchor="middle" font-size="10" fill="var(--muted)">${p.label}</text>`).join('');
  return `<svg viewBox="0 0 ${W} ${H}" width="100%" style="display:block">
    <defs><linearGradient id="wg" x1="0" x2="0" y1="0" y2="1"><stop offset="0" stop-color="var(--volt-deep)" stop-opacity="0.18"/><stop offset="1" stop-color="var(--volt-deep)" stop-opacity="0"/></linearGradient></defs>
    ${ticks}${tline}
    <path d="${area}" fill="url(#wg)"/>
    <path d="${line}" fill="none" stroke="var(--volt-deep)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    ${dots}${labels}</svg>`;
}

function progressPct(){
  const p=S.plan;
  if(p.targetWeight&&S.current!=null){
    const total=p.startWeight-p.targetWeight;
    if(Math.abs(total)<0.1)return 100;
    return Math.max(0,Math.min(100,((p.startWeight-S.current)/total)*100));
  }
  return Math.min(100,S.streak*4);
}
function nextMilestone(){const pc=progressPct();return MILESTONES.find(m=>m>pc)||100;}

function macroRow(label,g,color,pct){

function macroRow2(label,cur,target,color){

function uid(){return 'x'+Math.random().toString(36).slice(2,9);}
function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function num(v,d){v=parseFloat(v);return isFinite(v)?v:(d||0);}
const MEAL_TIMES={'Café da manhã':'07:30','Almoço':'12:30','Lanche':'16:00','Jantar':'20:00'};
function buildMealPlan(p){
  const dP=p.macros.protein_g,dC=p.macros.carb_g,dF=p.macros.fat_g;
  return p.meals.map(m=>{const sh=m.kcal/Math.max(p.target,1);return {id:uid(),name:m.name,time:MEAL_TIMES[m.name]||'12:00',
    foods:[{id:uid(),name:m.option,qty:'1 porção',kcal:m.kcal,p:Math.round(dP*sh),c:Math.round(dC*sh),f:Math.round(dF*sh)}]};});
}
function buildWeek(p,ans){
  const labels=[['seg','Segunda'],['ter','Terça'],['qua','Quarta'],['qui','Quinta'],['sex','Sexta'],['sab','Sábado'],['dom','Domingo']];
  const week=labels.map(l=>({key:l[0],label:l[1],workout:null,done:false}));
  const w=p.workout,n=w.length;
  const spread=({2:[0,3],3:[0,2,4],4:[0,1,3,4],5:[0,1,2,4,5],6:[0,1,2,3,4,5]}[n])||labels.map((_,i)=>i).slice(0,n);
  w.forEach((d,i)=>{const slot=spread[i]!=null?spread[i]:i;week[slot].workout={title:d.title,focus:d.focus,duration:(ans&&ans.time)||45,
    exercises:d.exercises.map(e=>({id:uid(),name:e.name,sets:e.sets,reps:e.reps,load:'',rest:'60s'}))};});
  return week;
}
function mealTotal(m){return m.foods.reduce((t,f)=>({kcal:t.kcal+num(f.kcal),p:t.p+num(f.p),c:t.c+num(f.c),f:t.f+num(f.f),sat:t.sat+num(f.sat),fib:t.fib+num(f.fib),sug:t.sug+num(f.sug),sod:t.sod+num(f.sod)}),{kcal:0,p:0,c:0,f:0,sat:0,fib:0,sug:0,sod:0});}
function dayTotal(){return S.mealPlan.reduce((t,m)=>{const x=mealTotal(m);return {kcal:t.kcal+x.kcal,p:t.p+x.p,c:t.c+x.c,f:t.f+x.f,sat:t.sat+x.sat,fib:t.fib+x.fib,sug:t.sug+x.sug,sod:t.sod+x.sod};},{kcal:0,p:0,c:0,f:0,sat:0,fib:0,sug:0,sod:0});}
function findMeal(id){return S.mealPlan.find(m=>m.id===id);}
function findDay(k){return S.week.find(d=>d.key===k);}
function nextWorkoutDay(){return S.week.find(d=>d.workout&&!d.done)||S.week.find(d=>d.workout)||null;}

function norm(s){return String(s==null?'':s).toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9\s]/g,' ').replace(/\s+/g,' ').trim();}
const FOODS=FOOD_RAW.map(r=>({id:'db-'+norm(r[0]).replace(/\s+/g,'-'),name:r[0],aliases:r[1]||[],kcal:r[2],p:r[3],c:r[4],f:r[5],sat:r[6],fib:r[7],sug:r[8],sod:r[9],unit:r[10]||'g',unitG:r[11]||null,db:true}));
function lev(a,b){const m=a.length,n=b.length;if(!m)return n;if(!n)return m;const dp=Array.from({length:m+1},(_,i)=>[i].concat(Array(n).fill(0)));for(let j=1;j<=n;j++)dp[0][j]=j;for(let i=1;i<=m;i++)for(let j=1;j<=n;j++){const c=a[i-1]===b[j-1]?0:1;dp[i][j]=Math.min(dp[i-1][j]+1,dp[i][j-1]+1,dp[i-1][j-1]+c);}return dp[m][n];}
function allFoods(){return FOODS.concat(S.foodDB.custom||[]);}
function foodById(id){return allFoods().find(f=>f.id===id);}
function searchFoods(q,limit){
  q=norm(q); if(!q)return [];
  const qt=q.split(' ').filter(Boolean);
  const scored=allFoods().map(f=>{
    const names=[norm(f.name)].concat((f.aliases||[]).map(norm));
    let best=0;
    names.forEach(n=>{
      let sc=0; const nt=n.split(' ');
      if(n===q)sc=120; else if(n.startsWith(q))sc=90; else if(n.includes(q))sc=64;
      qt.forEach(t=>{
        if(nt.includes(t))sc+=20;
        else{let md=99;nt.forEach(w=>{const d=lev(t,w);if(d<md)md=d;});const tol=t.length<=4?1:2;
          if(md<=tol)sc+=14-md*4; else if(nt.some(w=>w.startsWith(t)||t.startsWith(w)))sc+=9;}
      });
      if(sc>best)best=sc;
    });
    if(best>0&&(S.foodDB.favs||[]).includes(f.id))best+=6;
    return {f,sc:best};
  }).filter(x=>x.sc>0).sort((a,b)=>b.sc-a.sc);
  return scored.slice(0,limit||8).map(x=>x.f);
}
const UNIT_ALIAS={g:'g',grama:'g',gramas:'g',gr:'g',kg:'kg',quilo:'kg',quilos:'kg',ml:'ml',mililitro:'ml',mililitros:'ml',l:'l',litro:'l',litros:'l',un:'un',und:'un',unid:'un',unidade:'un',unidades:'un',colher:'colher',colheres:'colher',ch:'colher',fatia:'fatia',fatias:'fatia',xicara:'xicara',xicaras:'xicara',copo:'copo',copos:'copo'};
function parseInput(str){
  const s=norm(str);
  const m=s.match(/^(\d+([.,]\d+)?)\s*([a-z]+)?\s*(?:de\s+)?(.*)$/);
  if(!m||!m[1])return {qty:null,unit:null,query:s};
  let qty=parseFloat(m[1].replace(',','.'));
  let uraw=m[3]||'',query=m[4]||'';
  let unit=UNIT_ALIAS[uraw]||null;
  if(!unit&&uraw){query=(uraw+' '+query).trim();}
  return {qty:isFinite(qty)?qty:null,unit,query:query.trim()};
}
function unitOptions(food){
  const liquid=food&&food.unit==='ml';
  const opts=[];
  if(food&&food.unitG)opts.push(['un','unidade']);
  opts.push(['g','gramas (g)']);
  if(liquid)opts.push(['ml','ml']);
  opts.push(['colher','colher (15g)'],['fatia','fatia'],['xicara','xícara (120g)']);
  if(liquid)opts.push(['copo','copo (200ml)']);
  return opts;
}
function toGrams(food,qty,unit){qty=num(qty,0);switch(unit){
  case 'kg':return qty*1000; case 'l':return qty*1000; case 'ml':return qty;
  case 'un':return qty*(food.unitG||100); case 'colher':return qty*15;
  case 'fatia':return qty*(food.unitG||20); case 'xicara':return qty*120; case 'copo':return qty*200;
  default:return qty;} }
function scaleFood(food,qty,unit){const g=toGrams(food,qty,unit),k=g/100,r=(v,d)=>Math.round((v*k)*(d||1))/(d||1);
  return {kcal:Math.round(food.kcal*k),p:r(food.p,10),c:r(food.c,10),f:r(food.f,10),sat:r(food.sat,10),fib:r(food.fib,10),sug:r(food.sug,10),sod:Math.round(food.sod*k),grams:Math.round(g)};}
function unitLabel(u){return {g:'g',ml:'ml',un:'un',kg:'kg',l:'L',colher:'colher',fatia:'fatia',xicara:'xíc.',copo:'copo'}[u]||u;}

  const A=S.analyzer,f=foodById(A.selected),m=findMeal(A.mealId);if(!f||!m)return;

  pushRecent(f.id); A.added++; A.addedKcal+=n.kcal; A.selected=null;
  saveSession(); toast(`${f.name} adicionado (${n.kcal} kcal).`,'check');

}

function toast(msg,icon){
  const wrap=$('#toasts');
  const el=document.createElement('div');
  el.className='toast';
  el.innerHTML=`<span class="tk">${ic(icon||'sparkles',16)}</span><span>${msg}</span>`;
  wrap.appendChild(el);
  setTimeout(()=>{el.style.transition='opacity .3s,transform .3s';el.style.opacity='0';el.style.transform='translateY(10px)';setTimeout(()=>el.remove(),300);},2600);
}

   ============================================================ */
function openModal(html){const m=$('#modal');m.innerHTML=html;m.classList.add('show');document.body.style.overflow='hidden';}
function closeModal(){const m=$('#modal');m.classList.remove('show');m.innerHTML='';document.body.style.overflow='';}
function fileToDataURL(file){
  return new Promise((res,rej)=>{
    const r=new FileReader();
    r.onload=()=>{const s=r.result;const m=/^data:(.*?);base64,(.*)$/.exec(s);res({url:s,mediaType:m?m[1]:'image/jpeg',data:m?m[2]:''});};
    r.onerror=rej; r.readAsDataURL(file);
  });
}
async function analyzeMealPhoto(file){
  let info;
  try{ info=await fileToDataURL(file); }catch(e){ return; }
  S._pendingMealUrl=info.url; S.lastAnalysis=null;
  openModal(modalLoading(info.url));
  const prompt='Você é um nutricionista analisando a foto de uma refeição. Identifique os alimentos visíveis e estime as porções e os valores nutricionais totais do prato. Responda APENAS com um objeto JSON válido, sem markdown, sem crases, sem texto antes ou depois, exatamente neste formato: {"is_food": true, "dish": "nome curto do prato em português", "items": ["alimento 1", "alimento 2"], "calories": 000, "protein_g": 00, "carbs_g": 00, "fat_g": 00, "confidence": "baixa|média|alta", "note": "observação curta em português"}. Use números inteiros. Se a imagem não contiver comida, retorne {"is_food": false} com os demais campos zerados. Baseie a estimativa em porções típicas pelo que é visível na foto.';
  try{
    const resp=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:1000,messages:[{role:'user',content:[
        {type:'image',source:{type:'base64',media_type:info.mediaType,data:info.data}},
        {type:'text',text:prompt}]}]})
    });
    if(!resp.ok)throw new Error('status '+resp.status);
    const data=await resp.json();
    const txt=(data.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('\n');
    const clean=txt.replace(/```json/gi,'').replace(/```/g,'').trim();
    const obj=JSON.parse(clean);
    if(obj.is_food===false){openModal(modalNotFood(info.url));return;}
    S.lastAnalysis=Object.assign({url:info.url},obj);
    openModal(modalResult(S.lastAnalysis));
  }catch(err){
    openModal(modalError(info.url));
  }
}

function pushFood(entry){
  S.foodLog.unshift(entry);
  if(!S.badges.includes('foto_refeicao')){S.badges.push('foto_refeicao');toast('Conquista: Refeição por foto!','utensils');}
  const consumed=S.foodLog.reduce((s,f)=>s+f.kcal,0);
  if(consumed>=0.6*S.plan.target)S.tasks.refeicoes=true;
  closeModal(); toast('Refeição adicionada ao diário.','apple'); rerenderTab();
}
function addFoodFromModal(){
  const a=S.lastAnalysis; if(!a)return;
  const inp=$('#analyze-kcal-input');
  const kcal=Math.round((inp&&parseFloat(inp.value))||a.calories||0);
  pushFood({name:a.dish||'Refeição',items:a.items||[],kcal,protein:Math.round(a.protein_g||0),carbs:Math.round(a.carbs_g||0),fat:Math.round(a.fat_g||0),url:a.url,time:nowTime()});
}
function addFoodManual(){
  const inp=$('#manual-kcal-input'), nameInp=$('#manual-name-input');
  const kcal=Math.round((inp&&parseFloat(inp.value))||0);
  if(!kcal){if(inp)inp.style.borderColor='var(--ember)';return;}
  pushFood({name:(nameInp&&nameInp.value.trim())||'Refeição',items:[],kcal,protein:0,carbs:0,fat:0,url:S._pendingMealUrl,time:nowTime()});
}
function nowTime(){return new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});}

/* ============================================================
   AÇÕES / EVENTOS
   ============================================================ */
function generate(){S.screen='generating';S.plan=computePlan(S.goalKey,S.answers);S.current=S.plan.startWeight;
  const dir=S.goalKey==='massa'?1:-1;
  S.weightLog=[3,2,1,0].map(k=>({label:k===0?'Hoje':`-${k}sem`,weight:Math.round((S.plan.startWeight-dir*k*0.4)*10)/10}));
  S.weightLog=S.weightLog.map(x=>({label:x.label,v:x.weight}));
  S.mealPlan=buildMealPlan(S.plan);
  S.week=buildWeek(S.plan,S.answers);
  render();
}
function addWeight(){
  const inp=$('#weight-input'); if(!inp)return;
  const v=parseFloat(inp.value); if(!v)return;
  S.current=v; S.weightLog.push({label:'Hoje',v});
  if(!S.badges.includes('primeiro_peso')){S.badges.push('primeiro_peso');toast('Conquista: Primeiro registro de peso!','trophy');}
  else toast('Peso registrado com sucesso.','scale');
  rerenderTab();
}
function toggleTask(k){
  S.tasks[k]=!S.tasks[k];
  const done=Object.values(S.tasks).filter(Boolean).length;
  if(k==='treino'&&S.tasks[k]){S.streak++;toast('Treino registrado. Sequência mantida!','flame');
    if(S.streak>=7&&!S.badges.includes('streak7')){S.badges.push('streak7');toast('Conquista: 7 dias seguidos!','flame');}}
  if(done===4&&!S.badges.includes('dia_perfeito')){S.badges.push('dia_perfeito');toast('Conquista: Dia perfeito! Todas as tarefas concluídas.','medal');}
  rerenderTab();
}
function addWater(){
  S.water++;
  if(S.water>=Math.ceil(S.plan.water*4)){S.tasks.agua=true;toast('Meta de água batida!','droplet');}
  rerenderTab();
}
function triggerPhoto(){$('#photo-input').click();}
function onPhoto(file){
  const url=URL.createObjectURL(file);
  S.photos.unshift({url,date:new Date().toLocaleDateString('pt-BR')});
  if(!S.badges.includes('primeira_foto')){S.badges.push('primeira_foto');toast('Conquista: Primeira foto de progresso!','camera');}
  rerenderTab();
}

document.addEventListener('click',e=>{
  if(e.target.id==='modal'){return closeModal();}
  const t=e.target.closest('[data-action]'); if(!t)return;
  const act=t.getAttribute('data-action');
  if(act==='analyze-photo'){return $('#meal-photo-input').click();}
  if(act==='modal-close'){return closeModal();}
  if(act==='modal-add-food'){return addFoodFromModal();}
  if(act==='modal-add-manual'){return addFoodManual();}
  if(act==='remove-food'){S.foodLog.splice(+t.getAttribute('data-idx'),1);return rerenderTab();}
  if(act==='start'){S.screen='goal';return render();}
  if(act==='pick-goal'){S.goalKey=t.getAttribute('data-goal');S.quizStep=0;S.screen='quiz';return render();}
  if(act==='quiz-back'){if(S.quizStep===0){S.screen='goal';return render();}S.quizStep--;return render();}
  if(act==='quiz-next'){if(S.quizStep===3){return generate();}S.quizStep++;return render();}
  if(act==='set'){
    let v=t.getAttribute('data-value');
    if(t.getAttribute('data-num'))v=parseInt(v,10);
    if(!isNaN(Number(v))&&(t.getAttribute('data-key')==='time'))v=parseInt(v,10);
    S.answers[t.getAttribute('data-key')]=v;
    return render();
  }
  if(act==='num'){
    const key=t.getAttribute('data-key'),dir=+t.getAttribute('data-dir'),min=+t.getAttribute('data-min'),max=+t.getAttribute('data-max'),step=+t.getAttribute('data-step');
    let cur=S.answers[key]; if(cur==null)cur=min;
    let nv=Math.min(max,Math.max(min,Math.round((cur+dir*step)*100)/100));
    S.answers[key]=nv;
    const el=document.querySelector(`[data-numval="${key}"]`);
    if(el){const sfx=el.querySelector('span');el.childNodes[0].nodeValue=nv;if(sfx)el.appendChild(sfx);}
    return;
  }
  if(act==='toggle-restriction'){
    const v=t.getAttribute('data-value');
    if(v==='Sem restrições')S.answers.restrictions=['Sem restrições'];
    else{let a=S.answers.restrictions.filter(x=>x!=='Sem restrições');S.answers.restrictions=a.includes(v)?a.filter(x=>x!==v):a.concat(v);if(!S.answers.restrictions.length)S.answers.restrictions=['Sem restrições'];}
    return render();
  }
  if(act==='toggle-fav'){
    const v=t.getAttribute('data-value');let a=S.answers.favs;
    S.answers.favs=a.includes(v)?a.filter(x=>x!==v):a.concat(v);
    return render();
  }
  if(act==='nav'){S.tab=t.getAttribute('data-tab');return rerenderTab();}
  if(act==='toggle-task'){return toggleTask(t.getAttribute('data-task'));}
  if(act==='log-task'){return toggleTask(t.getAttribute('data-task'));}
  if(act==='add-water'){return addWater();}
  if(act==='add-weight'){return addWeight();}
  if(act==='day-tab'){S.planDay=+t.getAttribute('data-day');return rerenderTab();}
  if(act==='add-photo'){return triggerPhoto();}
  if(act==='measure'){
    const key=t.getAttribute('data-key'),dir=+t.getAttribute('data-dir');
    S.measures[key]=Math.max(20,Math.min(200,Math.round((S.measures[key]+dir*0.5)*10)/10));
    const el=document.querySelector(`[data-measureval="${key}"]`);
    if(el){const sfx=el.querySelector('span');el.childNodes[0].nodeValue=S.measures[key];if(sfx)el.appendChild(sfx);}
    saveSession();
    return;
  }
  if(act==='google-signin'){return openModal(modalGoogle());}
  if(act==='google-continue'){
    const name=($('#g-name')&&$('#g-name').value.trim())||'', email=($('#g-email')&&$('#g-email').value.trim())||'';
    if(!validEmail(email)){if($('#g-email'))$('#g-email').style.borderColor='var(--ember)';return;}
    return finalizeAccount({name:name||email.split('@')[0],email,provider:'google'});
  }
  if(act==='email-signup'){
    const name=($('#auth-name')&&$('#auth-name').value.trim())||'', email=($('#auth-email')&&$('#auth-email').value.trim())||'';
    if(!validEmail(email)){if($('#auth-email'))$('#auth-email').style.borderColor='var(--ember)';toast('Informe um e-mail válido.','x');return;}
    return finalizeAccount({name:name||email.split('@')[0],email,provider:'email'});
  }
  if(act==='signout'){return signout();}
  // ----- DIETA editável -----
  if(act==='meal-add'){S._edit={};return openModal(modalMealEditor(null));}
  if(act==='meal-edit'){S._edit={mealId:t.getAttribute('data-meal')};return openModal(modalMealEditor(findMeal(S._edit.mealId)));}
  if(act==='meal-del'){S.mealPlan=S.mealPlan.filter(m=>m.id!==t.getAttribute('data-meal'));return rerenderTab();}
  if(act==='meal-save'){return saveMeal();}
  if(act==='food-add'){S._edit={mealId:t.getAttribute('data-meal')};return openModal(modalFoodEditor(findMeal(S._edit.mealId),null));}
  if(act==='food-edit'){const mid=t.getAttribute('data-meal'),fid=t.getAttribute('data-food');S._edit={mealId:mid,foodId:fid};return openModal(modalFoodEditor(findMeal(mid),findMeal(mid).foods.find(x=>x.id===fid)));}
  if(act==='food-del'){const m=findMeal(t.getAttribute('data-meal'));if(m)m.foods=m.foods.filter(f=>f.id!==t.getAttribute('data-food'));return rerenderTab();}
  if(act==='food-save'){return saveFood();}
  if(act==='food-dup'){const m=findMeal(t.getAttribute('data-meal'));if(m){const f=m.foods.find(x=>x.id===t.getAttribute('data-food'));if(f){const c=Object.assign({},f,{id:uid()});m.foods.splice(m.foods.indexOf(f)+1,0,c);}}return rerenderTab();}
  if(act==='meal-dup'){const m=findMeal(t.getAttribute('data-meal'));if(m){const c=JSON.parse(JSON.stringify(m));c.id=uid();c.name=m.name+' (cópia)';c.foods.forEach(f=>f.id=uid());S.mealPlan.splice(S.mealPlan.indexOf(m)+1,0,c);}return rerenderTab();}
  // ----- ANALISADOR DE ALIMENTOS COM IA -----
  if(act==='az-open'){return openAnalyzer(t.getAttribute('data-meal'));}
  if(act==='az-tab'){S.analyzer.tab=t.getAttribute('data-tab');S.analyzer.selected=null;azRefresh('results');azRefresh('detail');return;}
  if(act==='az-pick'){return azPick(t.getAttribute('data-id'));}
  if(act==='az-fav'){const id=t.getAttribute('data-id');const favs=S.foodDB.favs;const i=favs.indexOf(id);if(i>=0)favs.splice(i,1);else favs.push(id);saveSession();azRefresh('results');return;}
  if(act==='az-hist'){S.analyzer.tab='buscar';S.analyzer.query=t.getAttribute('data-q');const inp=$('#az-input');if(inp)inp.value=S.analyzer.query;azRefresh('results');azRefresh('detail');return;}
  if(act==='az-qty'){const d=parseFloat(t.getAttribute('data-d'));const step=(S.analyzer.unit==='un')?1:(S.analyzer.unit==='g'||S.analyzer.unit==='ml'?10:1);S.analyzer.qty=Math.max(0,num(S.analyzer.qty,0)+d*step);const qi=$('#az-qty');if(qi)qi.value=S.analyzer.qty;azRefresh('summary');return;}
  if(act==='az-add'){return azAdd();}
  if(act==='az-manual'){const d=$('#az-detail');if(d)d.innerHTML=azManualHTML();const r=$('#az-results');if(r)r.innerHTML='';return;}
  if(act==='az-manual-cancel'){azRefresh('results');azRefresh('detail');return;}
  if(act==='az-manual-save'){return azSaveManual();}
  if(act==='az-done'){closeModal();rerenderTab();return;}
  // ----- TREINOS editáveis -----
  if(act==='w-add'){const d=findDay(t.getAttribute('data-day'));d.workout={title:'Novo treino',focus:'',duration:(S.answers.time||45),exercises:[]};d.done=false;return rerenderTab();}
  if(act==='w-done'){const d=findDay(t.getAttribute('data-day'));d.done=!d.done;if(d.done)toast('Treino concluído!','checkCircle');return rerenderTab();}
  if(act==='w-del'){const d=findDay(t.getAttribute('data-day'));d.workout=null;d.done=false;return rerenderTab();}
  if(act==='w-edit'){S._edit={dayKey:t.getAttribute('data-day')};return openModal(modalWorkoutEditor(findDay(S._edit.dayKey).workout));}
  if(act==='w-save'){return saveWorkout();}
  if(act==='w-copy'){return openModal(modalCopy(t.getAttribute('data-day')));}
  if(act==='w-copy-to'){const from=findDay(t.getAttribute('data-from')),to=findDay(t.getAttribute('data-to'));to.workout=JSON.parse(JSON.stringify(from.workout));to.workout.exercises.forEach(e=>e.id=uid());to.done=false;closeModal();rerenderTab();toast('Treino copiado para '+to.label+'.','check');return;}
  if(act==='ex-add'){S._edit={dayKey:t.getAttribute('data-day')};return openModal(modalExEditor(null));}
  if(act==='ex-edit'){const dk=t.getAttribute('data-day'),eid=t.getAttribute('data-ex');S._edit={dayKey:dk,exId:eid};return openModal(modalExEditor(findDay(dk).workout.exercises.find(x=>x.id===eid)));}
  if(act==='ex-del'){const d=findDay(t.getAttribute('data-day'));d.workout.exercises=d.workout.exercises.filter(e=>e.id!==t.getAttribute('data-ex'));return rerenderTab();}
  if(act==='ex-save'){return saveEx();}
  if(act==='ex-up'||act==='ex-down'){const d=findDay(t.getAttribute('data-day')),arr=d.workout.exercises,i=arr.findIndex(x=>x.id===t.getAttribute('data-ex')),j=act==='ex-up'?i-1:i+1;if(j>=0&&j<arr.length){const tmp=arr[i];arr[i]=arr[j];arr[j]=tmp;}return rerenderTab();}
});
document.addEventListener('input',e=>{
  const t=e.target;
  if(t.id==='az-input'){S.analyzer.query=t.value;S.analyzer.selected=null;azRefresh('results');azRefresh('detail');return;}
  if(t.id==='az-qty'){S.analyzer.qty=Math.max(0,num(t.value,0));azRefresh('summary');return;}
  const m=t.closest&&t.closest('[data-model]'); if(m){S.answers[m.getAttribute('data-model')]=t.value;}
});
document.addEventListener('change',e=>{
  if(e.target.id==='az-unit'){S.analyzer.unit=e.target.value;azRefresh('summary');}
});
$('#photo-input').addEventListener('change',e=>{if(e.target.files[0]){onPhoto(e.target.files[0]);e.target.value='';}});
$('#meal-photo-input').addEventListener('change',e=>{if(e.target.files[0]){analyzeMealPhoto(e.target.files[0]);e.target.value='';}});
document.addEventListener('keydown',e=>{if(e.key==='Escape'&&$('#modal').classList.contains('show'))closeModal();});

(async()=>{
  const ok=await loadSession();
  if(ok){S.screen='app';S.tab='home';}
  render();
})();

</script>
</body>
</html>
